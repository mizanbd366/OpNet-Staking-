<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OpNet Staking Demo</title>
<style>
body{
  font-family:Arial, sans-serif;
  background:#f4f4f4;
  margin:0;
}
.header{
  background:#111;
  color:white;
  padding:15px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}
button{
  padding:10px 15px;
  border:none;
  border-radius:6px;
  cursor:pointer;
  font-weight:bold;
}
.connect{background:#ff6600;color:white;}
.container{padding:20px;}
.card{
  background:white;
  padding:20px;
  border-radius:10px;
  margin-bottom:15px;
  box-shadow:0 4px 10px rgba(0,0,0,0.1);
}
input{
  width:100%;
  padding:10px;
  margin-top:10px;
  margin-bottom:10px;
  border-radius:6px;
  border:1px solid #ccc;
}
.stake{background:green;color:white;width:100%;}
.unstake{background:red;color:white;width:100%;}
.claim{background:#ff6600;color:white;width:100%;margin-top:10px;}
.info{font-weight:bold;margin-top:10px;}
</style>
</head>
<body>

<div class="header">
  <div>OpNet Staking</div>
  <button class="connect" onclick="connectWallet()" id="connectBtn">Connect</button>
</div>

<div class="container">

  <div class="card">
    <h3>Dashboard</h3>
    <div>Total Balance: <span id="balance">1250</span> OP</div>
    <div>Total Staked: <span id="staked">0</span> OP</div>
    <div>Rewards: <span id="rewards">0</span> OP</div>
  </div>

  <div class="card">
    <h3>Stake / Unstake</h3>
    <input type="number" id="amount" placeholder="Enter OP amount">
    <button class="stake" onclick="stake()">Stake</button>
    <button class="unstake" onclick="unstake()">Unstake</button>
    <button class="claim" onclick="claim()">Claim Rewards</button>
    <div class="info" id="message"></div>
  </div>

</div>

<script>
let connected = false;
let balance = 1250;
let staked = 0;
let rewards = 0;

function updateUI(){
  document.getElementById("balance").innerText = balance;
  document.getElementById("staked").innerText = staked;
  document.getElementById("rewards").innerText = rewards.toFixed(2);
}

function connectWallet(){
  connected = !connected;
  const btn = document.getElementById("connectBtn");
  if(connected){
    btn.innerText = "Connected";
    btn.style.background = "green";
    showMessage("Wallet Connected");
  }else{
    btn.innerText = "Connect";
    btn.style.background = "#ff6600";
    showMessage("Wallet Disconnected");
  }
}

function stake(){
  if(!connected) return showMessage("Connect wallet first!");
  let amt = parseFloat(document.getElementById("amount").value);
  if(!amt || amt<=0) return showMessage("Enter valid amount");
  if(amt>balance) return showMessage("Insufficient balance");

  balance -= amt;
  staked += amt;
  rewards += amt * 0.02; // 2% instant reward demo

  updateUI();
  showMessage("Stake successful");
}

function unstake(){
  if(!connected) return showMessage("Connect wallet first!");
  let amt = parseFloat(document.getElementById("amount").value);
  if(!amt || amt<=0) return showMessage("Enter valid amount");
  if(amt>staked) return showMessage("Not enough staked");

  staked -= amt;
  balance += amt;

  updateUI();
  showMessage("Unstake successful");
}

function claim(){
  if(!connected) return showMessage("Connect wallet first!");
  if(rewards<=0) return showMessage("No rewards available");

  balance += rewards;
  rewards = 0;

  updateUI();
  showMessage("Rewards claimed");
}

function showMessage(msg){
  document.getElementById("message").innerText = msg;
}

updateUI();
</script>

</body>
</html>
