<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OpNet Staking Pro</title>

<script src="https://cdn.jsdelivr.net/npm/ethers/dist/ethers.min.js"></script>

<style>
body{margin:0;font-family:Arial;background:#f4f6f9}
.header{
background:white;
padding:15px;
display:flex;
justify-content:space-between;
align-items:center;
box-shadow:0 2px 5px rgba(0,0,0,0.1)
}
.logo{font-weight:bold;font-size:18px}
.connect{
background:#ff6600;
color:white;
border:none;
padding:8px 14px;
border-radius:6px;
font-weight:bold;
cursor:pointer;
}
.nav{
display:flex;
justify-content:space-around;
background:white;
padding:12px 0;
position:fixed;
bottom:0;
width:100%;
box-shadow:0 -2px 5px rgba(0,0,0,0.1)
}
.nav button{
background:none;
border:none;
font-weight:bold;
cursor:pointer;
}
.container{padding:20px;padding-bottom:90px}
.card{
background:white;
padding:15px;
border-radius:12px;
margin-bottom:15px;
box-shadow:0 4px 10px rgba(0,0,0,0.08)
}
input{
width:100%;
padding:10px;
margin-top:10px;
margin-bottom:10px;
border-radius:6px;
border:1px solid #ccc;
}
button.action{
width:100%;
padding:10px;
border:none;
border-radius:6px;
font-weight:bold;
cursor:pointer;
margin-top:5px;
}
.stake{background:green;color:white}
.unstake{background:red;color:white}
.claim{background:#ff6600;color:white}
.hidden{display:none}
</style>
</head>

<body>

<div class="header">
<div class="logo">OpNet Staking</div>
<button class="connect" onclick="connectWallet()" id="connectBtn">Connect Wallet</button>
</div>

<div class="container">

<!-- DASHBOARD -->
<div id="dashboardPage">

<div class="card">
<h3>Dashboard</h3>
<p>Wallet Balance: <b><span id="walletBalance">0</span> OP</b></p>
<p>Total Staked: <b><span id="totalStaked">0</span> OP</b></p>
<p>Pending Rewards: <b><span id="pendingRewards">0</span> OP</b></p>
<p>Portfolio Value: <b>$<span id="portfolioValue">0</span></b></p>
</div>

<div class="card">
<h3>Active Pools</h3>
<p>OP/BTC — 24.5% APY</p>
<p>OP/ETH — 18.2% APY</p>
<p>OP Solo — 12.8% APY</p>
</div>

</div>

<!-- STAKE -->
<div id="stakePage" class="hidden">
<div class="card">
<h3>Stake / Unstake</h3>
<input type="number" id="amount" placeholder="Enter OP amount">
<button class="action stake" onclick="stake()">Stake</button>
<button class="action unstake" onclick="unstake()">Unstake</button>
</div>
</div>

<!-- REWARDS -->
<div id="rewardsPage" class="hidden">
<div class="card">
<h3>Your Rewards</h3>
<p><b><span id="rewardDisplay">0</span> OP</b></p>
<button class="action claim" onclick="claimRewards()">Claim Rewards</button>
</div>
</div>

<!-- HISTORY -->
<div id="historyPage" class="hidden">
<div class="card">
<h3>Transaction History</h3>
<ul id="historyList"></ul>
</div>
</div>

</div>

<!-- NAV -->
<div class="nav">
<button onclick="showPage('dashboard')">Dashboard</button>
<button onclick="showPage('stake')">Stake</button>
<button onclick="showPage('rewards')">Rewards</button>
<button onclick="showPage('history')">History</button>
</div>

<script>

let provider;
let signer;
let userAddress=null;

let walletBalance=0;
let staked=0;
let rewards=0;
let history=[];

/* WALLET CONNECT */
async function connectWallet(){

if(typeof window.ethereum !== "undefined"){

  try{
    await window.ethereum.request({ method: 'eth_requestAccounts' });

    provider = new ethers.providers.Web3Provider(window.ethereum);
    signer = provider.getSigner();
    userAddress = await signer.getAddress();

    document.getElementById("connectBtn").innerText =
      userAddress.substring(0,6)+"..."+userAddress.slice(-4);

    document.getElementById("connectBtn").style.background="green";

    // get real ETH balance
    const balance = await provider.getBalance(userAddress);
    walletBalance = parseFloat(ethers.utils.formatEther(balance)).toFixed(4);

    updateUI();

  }catch(err){
    alert("Connection Rejected");
  }

}else{
  alert("MetaMask not installed");
}

}

/* STAKE */
function stake(){
if(!userAddress) return alert("Connect wallet first");

let amt=parseFloat(document.getElementById("amount").value);
if(!amt||amt<=0) return alert("Enter valid amount");
if(amt>walletBalance) return alert("Insufficient balance");

walletBalance-=amt;
staked+=amt;
let reward=amt*0.02;
rewards+=reward;

history.push("Staked "+amt+" OP");
updateUI();
}

/* UNSTAKE */
function unstake(){
if(!userAddress) return alert("Connect wallet first");

let amt=parseFloat(document.getElementById("amount").value);
if(!amt||amt<=0) return alert("Enter valid amount");
if(amt>staked) return alert("Not enough staked");

staked-=amt;
walletBalance+=amt;

history.push("Unstaked "+amt+" OP");
updateUI();
}

/* CLAIM */
function claimRewards(){
if(!userAddress) return alert("Connect wallet first");
if(rewards<=0) return alert("No rewards");

walletBalance+=rewards;
history.push("Claimed "+rewards.toFixed(4)+" OP rewards");

rewards=0;
updateUI();
}

/* UI UPDATE */
function updateUI(){
document.getElementById("walletBalance").innerText=parseFloat(walletBalance).toFixed(4);
document.getElementById("totalStaked").innerText=staked.toFixed(4);
document.getElementById("pendingRewards").innerText=rewards.toFixed(4);
document.getElementById("rewardDisplay").innerText=rewards.toFixed(4);
document.getElementById("portfolioValue").innerText=(staked*2).toFixed(2);

let list=document.getElementById("historyList");
list.innerHTML="";
history.forEach(h=>{
let li=document.createElement("li");
li.innerText=h;
list.appendChild(li);
});
}

/* PAGE SWITCH */
function showPage(page){
document.getElementById("dashboardPage").classList.add("hidden");
document.getElementById("stakePage").classList.add("hidden");
document.getElementById("rewardsPage").classList.add("hidden");
document.getElementById("historyPage").classList.add("hidden");

document.getElementById(page+"Page").classList.remove("hidden");
}

</script>

</body>
</html>
